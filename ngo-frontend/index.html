<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SeaPort NGO Portal - Login</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #065f46 0%, #047857 100%);
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-logo h1 {
      color: var(--color-primary);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .login-logo p {
      color: var(--color-text-muted);
      font-size: 14px;
      margin-top: 5px;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  
  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">
        <h1>SeaPort NGO Portal</h1>
        <p>Humanitarian Operations Network</p>
      </div>
      
      <form id="ngo-login-form">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="login-email" class="form-input" required placeholder="admin@ngo.org">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="login-password" class="form-input" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary login-btn">Sign In to NGO Portal</button>
        <div style="margin-top:20px; text-align:center; font-size:14px;">
           <a href="#" onclick="toggleForm('register')" style="color:var(--color-primary);text-decoration:none;font-weight:600">Apply to Join as NGO</a>
        </div>
      </form>
      
      <form id="ngo-register-form" style="display:none">
        <h3 style="margin-bottom:16px; color:var(--color-primary); font-size:16px; font-weight:700;">NGO Application Request</h3>
        <div class="form-group"><label class="form-label">NGO Name *</label><input type="text" id="reg-name" required class="form-input" placeholder="e.g. Action Against Hunger"></div>
        <div class="form-group"><label class="form-label">Focus Area</label><input type="text" id="reg-focus" class="form-input" placeholder="e.g. Legal Aid, Medical"></div>
        <div class="form-group"><label class="form-label">Contact Person</label><input type="text" id="reg-contact" class="form-input"></div>
        <div class="form-group"><label class="form-label">Max Capacity</label><input type="number" id="reg-capacity" class="form-input" value="100"></div>
        <hr style="margin:20px 0; border:0; border-top:1px solid #e5e7eb;">
        <div class="form-group"><label class="form-label">Admin Email *</label><input type="email" id="reg-email" required class="form-input" placeholder="admin@ngo.org"></div>
        <div class="form-group"><label class="form-label">Admin Password *</label><input type="password" id="reg-password" required class="form-input" placeholder="••••••••"></div>
        <button type="submit" class="btn btn-primary login-btn">Submit Application</button>
        <div style="margin-top:20px; text-align:center; font-size:14px;">
           <a href="#" onclick="toggleForm('login')" style="color:var(--color-text-muted);text-decoration:none;">&larr; Back to Login</a>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.getElementById('ngo-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-password').value;
      
      const btn = document.querySelector('.login-btn');
      btn.innerText = 'Verifying...';
      btn.disabled = true;

      const res = await apiFetch('/api/auth/ngo-login', {
        method: 'POST',
        body: JSON.stringify({ email, password: pass })
      });

      if (res.success) {
        sessionStorage.setItem('ngo_token', res.data.token);
        sessionStorage.setItem('ngo_role', res.data.role);
        sessionStorage.setItem('ngo_id', res.data.ngo_id);
        sessionStorage.setItem('ngo_name_user', res.data.name);
        
        if (res.data.role === 'ngo_admin') {
          window.location.href = 'admin-dashboard.html';
        } else {
          window.location.href = 'worker-dashboard.html';
        }
      } else {
        showToast(res.message || 'Login failed', 'error');
        btn.innerText = 'Sign In to NGO Portal';
        btn.disabled = false;
      }
    });

    function toggleForm(type) {
        document.getElementById('ngo-login-form').style.display = type === 'login' ? 'block' : 'none';
        document.getElementById('ngo-register-form').style.display = type === 'register' ? 'block' : 'none';
    }

    document.getElementById('ngo-register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        btn.innerText = 'Submitting...';
        btn.disabled = true;

        const payload = {
            name: document.getElementById('reg-name').value,
            focus_area: document.getElementById('reg-focus').value,
            contact_person: document.getElementById('reg-contact').value,
            max_capacity: document.getElementById('reg-capacity').value,
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-password').value
        };

        const res = await apiFetch('/api/auth/ngo-apply', {
            method: 'POST',
            body: JSON.stringify(payload)
        });

        if (res.success) {
            showToast('Application submitted! Awaiting admin approval.', 'success');
            setTimeout(() => { toggleForm('login'); document.getElementById('ngo-register-form').reset(); }, 2000);
        } else {
            showToast(res.message || 'Application failed', 'error');
        }
        btn.innerText = 'Submit Application';
        btn.disabled = false;
    });

    // Auto-redirect if already logged in
    document.addEventListener('DOMContentLoaded', () => {
      if (sessionStorage.getItem('ngo_token')) {
        const role = sessionStorage.getItem('ngo_role');
        if (role === 'ngo_admin') window.location.href = 'admin-dashboard.html';
        if (role === 'ngo_worker') window.location.href = 'worker-dashboard.html';
      }
    });
  </script>
</body>
</html>
